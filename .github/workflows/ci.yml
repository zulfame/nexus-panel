name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Guard requirements.txt (PyPI-only)
        run: |
          if grep -inE '^[[:space:]]*emergentintegrations([[:space:]=<>!~]|$)' backend/requirements.txt; then
            echo "::error::backend/requirements.txt contains the internal-only 'emergentintegrations' package"; exit 1; fi
          if grep -inE '@[[:space:]]*https?://|emergentagent\.com' backend/requirements.txt; then
            echo "::error::backend/requirements.txt references private/direct-URL dependencies"; exit 1; fi
      - name: Install backend deps
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
          pip install pytest pytest-asyncio pytest-xdist
      - name: Run backend unit tests
        working-directory: backend
        run: pytest tests/test_core_units.py

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install & build frontend
        working-directory: frontend
        run: |
          yarn install --frozen-lockfile
          yarn build
        env:
          REACT_APP_BACKEND_URL: https://example.com
          CI: "false"
